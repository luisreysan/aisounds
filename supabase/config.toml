# =============================================================================
# Supabase CLI config (optional — only needed if you want to run Supabase
# locally via `supabase start`). The source of truth for this project is the
# hosted Supabase cloud project; migrations are applied there through the
# dashboard SQL editor or `psql`.
# =============================================================================

project_id = "aisounds"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://aisounds.dev"]
jwt_expiry = 3600
enable_signup = true

[auth.external.github]
enabled = false
client_id = ""
secret = ""
